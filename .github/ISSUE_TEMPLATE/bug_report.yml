name: Bug Report
description: Report a reproducible bug in the MailerMine SDK.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.

        > If this is a **security** issue, please **do not** file it here. See our
        > [security policy](https://github.com/rahulyadav5192/mailermine-laravel-sdk/security/policy).
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this has not been reported.
          required: true
        - label: I am using a supported version of the SDK, PHP, and Laravel.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal code sample that reproduces the issue.
      placeholder: |
        ```php
        $mm = new MailerMine\Client('...');
        $mm->emails()->send([...]);
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full exception message and stack trace if available.
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.3"
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version (if applicable)
      placeholder: "12.x"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help us understand the problem.
    validations:
      required: false
